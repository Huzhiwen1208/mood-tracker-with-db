services:
  mysql:
    image: mysql:8.0.39
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${DB_NAME:-mood_tracker_app}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "${DB_PORT_FORWARD:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: 9090
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-mood_tracker_session}
      DB_MODE: tcp
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-mood_tracker_app}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-30}
      DB_CONNECT_RETRY_DELAY_MS: ${DB_CONNECT_RETRY_DELAY_MS:-2000}
      ADMIN_ACCOUNT: ${ADMIN_ACCOUNT:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!@#}
      ADMIN_NICKNAME: ${ADMIN_NICKNAME:-系统管理员}
      SESSION_DAYS: ${SESSION_DAYS:-7}
    ports:
      - "${APP_PORT:-9090}:9090"

volumes:
  mysql-data:
